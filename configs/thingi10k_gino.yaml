model:
  hidden_channels: 120
  out_channels: 1
  n_layers: 4
  norm: "group_norm"
  use_mlp: true
  mlp:
    expansion: 1.0
    dropout: 0.0
  factorization: "tucker"
  rank: 0.4

training:
  n_epochs: 151
  batch_size: 1
  learning_rate: 0.001
  weight_decay: 0.0001
  step_size: 50
  gamma: 0.5
  seed: 42

dataset:
  name: "thingi10k"
  variant: "npz"
  source_cache_dir: "/media/HDD/mamta_backup/datasets/thingi10k"
  cache_dir: "/media/HDD/mamta_backup/datasets/thingi10k/cache"
  train_samples: 500
  test_samples: 111
  split_offset: 0
  num_points: 3586
  filters:
    num_vertices: [128, 20000]

output:
  dir: "results"

gino_official:
  in_channels: 1
  latent_grid_size: [16, 16, 16]
  n_modes: [16, 16, 16]
  hidden_channels: 120
  n_layers: 4
  latent_feature_channels: null
  in_gno_radius: 0.2
  out_gno_radius: 0.2
  in_gno_transform_type: "linear"
  out_gno_transform_type: "linear"
  in_gno_pos_embed_type: "transformer"
  out_gno_pos_embed_type: "transformer"
  gno_embed_channels: 32
  in_gno_channel_mlp_hidden_layers: [80, 80, 80]
  out_gno_channel_mlp_hidden_layers: [256, 256]
