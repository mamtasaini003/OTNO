# OTNO Baseline Configuration (Toroidal FNO — per paper ablation Table 6)
# References: ot_train.py from experiments/shapenet/topos/

model:
  n_modes: [32, 32]          # Reference uses (32, 32) spectral modes
  hidden_channels: 120
  in_channels: 9             # transports(3) + torus_coords(3) + normal_cross(3)
  out_channels: 1
  n_layers: 4
  norm: "group_norm"
  use_mlp: True
  mlp:
    expansion: 1.0
    dropout: 0.0
  factorization: "tucker"
  rank: 0.4
  domain_padding: 0.125      # Crucial for grid boundary artifacts

training:
  n_epochs: 151
  batch_size: 1
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: "StepLR"
  step_size: 50              # Reference: decay every 50 epochs (not 100)
  gamma: 0.5
  seed: 42

dataset:
  name: "abc"
  path: "/media/HDD/mamta_backup/datasets/otno/car-pressure-data/data"
  ot_data_path: "/media/HDD/mamta_backup/datasets/otno/car-pressure-data/torus_OTmean_geomloss_expand2.0.pt"
  train_samples: 500
  test_samples: 111
  resolution: 84             # Latent grid: 84×84 = 7056 (expand_factor=2.0, n_t=3586)
  expand_factor: 2.0
  cache_dir: "/media/HDD/mamta_backup/datasets/otno/car-pressure-data/dynamic_cache/otno"
