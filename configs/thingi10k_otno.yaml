model:
  n_modes: [32, 32]
  hidden_channels: 120
  in_channels: 9
  out_channels: 1
  n_layers: 4
  norm: "group_norm"
  use_mlp: true
  mlp:
    expansion: 1.0
    dropout: 0.0
  factorization: "tucker"
  rank: 0.4
  domain_padding: 0.125

training:
  n_epochs: 151
  batch_size: 1
  learning_rate: 0.001
  weight_decay: 0.0001
  step_size: 50
  gamma: 0.5
  seed: 42

dataset:
  name: "thingi10k"
  variant: "npz"
  source_cache_dir: "/media/HDD/mamta_backup/datasets/thingi10k"
  cache_dir: "/media/HDD/mamta_backup/datasets/thingi10k/cache"
  train_samples: 500
  test_samples: 111
  split_offset: 0
  num_points: 3586
  resolution: 84
  expand_factor: 2.0
  filters:
    num_vertices: [128, 20000]

output:
  dir: "results"
